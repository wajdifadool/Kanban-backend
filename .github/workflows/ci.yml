# This is a GitHub Actions workflow that runs your Node.js tests automatically.
# It runs every time you push code or open a pull request.

name: Node.js CI # Just a label for this workflow

on:
  push: # Run the workflow when you push code
    branches: ['**'] # You can list any branches you want to test
  pull_request: # Also run when you create a pull request
    branches: ['**']

jobs:
  test:
    runs-on: ubuntu-latest # Use the latest Ubuntu runner (virtual machine)
    environment: env1

    env:
      FILE_UPLOAD_PATH: ./uploads
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      JWT_EXPIRE: ${{ secrets.JWT_EXPIRE }}
      JWT_COOKIE_EXPIRE: ${{ secrets.JWT_COOKIE_EXPIRE }}

    steps:
      # Step 1: Checkout your repository code into the runner
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Node.js (you can change the version if needed)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Use Node.js 20 (adjust if you prefer 18 or 22)

      # Step 3: Install dependencies (from your package.json)
      - name: Install dependencies
        run: npm install

      # Step 4: Run ESLint to check for code quality issues
      # Make sure you have a "lint" script in your package.json!
      - name: Run ESLint
        run: npm run lint

      # Step 5: Run your test script
      # Make sure your package.json has a "test" script, e.g. "jest" or "mocha"
      - name: Run tests
        run: npm test
  # Job 2: Build the Docker Image (The new stuff)
  build-image:
    runs-on: ubuntu-latest
    needs: test # This tells GitHub: "Only run this if the 'test' job passes"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        # This uses the Dockerfile in your repo to build the image and tags it 'trello-api'
        run: docker build -t trello-api .
